    10% {

    }

<script>
document.addEventListener('DOMContentLoaded', function() {
// 获取当前页面标识
    const currentPath = window.location.pathname;
    const pageMap = {
        '/dashboard': 'dashboard',
        '/port_mapping': 'port_mapping',
        '/domain_mapping': 'domain_mapping',
        '/virtual_machines': 'virtual_machines',
        '/physical_machines': 'physical_machines',
        '/namespaces': 'namespaces',
        '/qualification_management': 'qualification_management',
        '/bsecp/modules': 'bsecp_modules',
        '/bsecp/authorization-query': 'bsecp_authorization_query',
        '/bsecp/auth-query-modify': 'bsecp_auth_query_modify',
        '/baoleiji': 'baoleiji',
        '/bastionManagement': 'baoleiji_list',
        '/host_monitoring': 'host_monitoring',
        '/k8smonitoring': 'k8s_monitoring',
        '/cron_monitoring': 'cron_monitoring',
        '/user_management': 'user_management'
    };
    
    // 设置当前页面为激活状态
    const currentPage = pageMap[currentPath] || 'dashboard';
    
    // 激活主菜单项
    const activeLink = document.querySelector(`[data-page="${currentPage}"]`);
    if (activeLink) {
        activeLink.classList.add('active');
        
        // 如果是子菜单项，展开父菜单
        const parentSubmenu = activeLink.closest('.submenu');
        if (parentSubmenu) {
            parentSubmenu.classList.add('show');
            const toggleBtn = parentSubmenu.previousElementSibling;
            if (toggleBtn) {
                toggleBtn.classList.remove('collapsed');
                toggleBtn.setAttribute('aria-expanded', 'true');
            }
        }
    }
    
    // 子菜单切换功能
    const submenuToggles = document.querySelectorAll('.submenu-toggle');
    submenuToggles.forEach(toggle => {
        toggle.addEventListener('click', function(e) {
            // 阻止默认行为和事件冒泡
            e.preventDefault();
            e.stopPropagation();
            
            // 获取关联的子菜单
            const targetId = this.getAttribute('href');
            const submenu = document.querySelector(targetId);
            
            // 检查当前状态
            const isExpanded = this.classList.contains('collapsed') || this.getAttribute('aria-expanded') === 'true';
            
            // 切换当前按钮状态
            this.classList.toggle('collapsed', !isExpanded);
            this.setAttribute('aria-expanded', isExpanded ? 'false' : 'true');
            
            // 切换子菜单显示
            if (submenu) {
                if (isExpanded) {
                    // 收起子菜单
                    submenu.classList.remove('show');
                } else {
                    // 展开子菜单
                    submenu.classList.add('show');
                }
            }
            
            // 图标旋转动画
            const icon = this.querySelector('.bi-chevron-down');
            if (icon) {
                icon.style.transition = 'transform 0.3s ease';
                icon.style.transform = isExpanded ? 'rotate(0deg)' : 'rotate(180deg)';
            }
        });
    });
    
    // 移动端菜单交互
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    
    if (menuToggle && sidebar && sidebarOverlay) {
        // 打开侧边栏
        menuToggle.addEventListener('click', function() {
            sidebar.classList.add('active');
            sidebarOverlay.classList.add('active');
            document.body.classList.add('sidebar-open'); // 使用CSS类控制滚动
            // 添加打开动画
            menuToggle.classList.add('trigger-open');
        });
        
        // 关闭侧边栏
        const closeSidebar = function() {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
            document.body.classList.remove('sidebar-open'); // 使用CSS类控制滚动
            // 移除打开动画
            menuToggle.classList.remove('trigger-open');
        };
        
        // 点击遮罩层关闭侧边栏
        sidebarOverlay.addEventListener('click', closeSidebar);
        
        // 点击侧边栏内部导航链接后关闭侧边栏（延时执行以确保链接跳转）
        const navLinks = sidebar.querySelectorAll('a[data-page]');
        navLinks.forEach(link => {
            link.addEventListener('click', function() {
                // 移除所有激活状态
                navLinks.forEach(l => l.classList.remove('active'));
                // 添加当前链接为激活状态
                this.classList.add('active');
                // 添加点击反馈动画
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                    closeSidebar();
                }, 150);
            });
        });
        
        // ESC键关闭侧边栏
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && sidebar.classList.contains('active')) {
                closeSidebar();
            }
        });
        
        // 触摸设备优化：滑动关闭侧边栏
        let touchStartX = 0;
        let isSwiping = false;
        
        sidebar.addEventListener('touchstart', function(e) {
            touchStartX = e.touches[0].clientX;
            isSwiping = true;
        }, { passive: true });
        
        sidebar.addEventListener('touchmove', function(e) {
            if (!isSwiping || !sidebar.classList.contains('active')) return;
            
            const touchX = e.touches[0].clientX;
            const diffX = touchX - touchStartX;
            
            // 向右滑动超过50px关闭侧边栏
            if (diffX > 50) {
                requestAnimationFrame(() => {
                    closeSidebar();
                });
                isSwiping = false;
            }
        }, { passive: true });
        
        sidebar.addEventListener('touchend', function() {
            isSwiping = false;
        }, { passive: true });
    }
    
    // 页面加载完成后初始化激活状态
    window.addEventListener('load', function() {
        try {
            // 移除所有激活状态
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            
            // 重新设置当前页面激活状态
            const activeLink = document.querySelector(`[data-page="${currentPage}"]`);
            if (activeLink) {
                activeLink.classList.add('active');
            }
            
            // 添加页面加载完成后的平滑过渡
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        } catch (error) {
            console.error('侧边栏初始化错误:', error);
            // 确保页面仍然可以正常显示
            document.body.classList.add('loaded');
        }
    });
    
    // 页面刷新时确保侧边栏正确展开和定位
    window.addEventListener('beforeunload', function() {
        // 保存当前页面状态到 sessionStorage
        sessionStorage.setItem('currentPage', currentPage);
    });
    
    // 页面加载时检查是否需要展开侧边栏
    window.addEventListener('pageshow', function() {
        // 获取保存的页面状态
        const savedPage = sessionStorage.getItem('currentPage');
        if (savedPage && savedPage === 'bsecp_auth_query_modify') {
            // 确保BSECP子菜单展开
            const bsecpSubmenu = document.getElementById('bsecpSubmenu');
            const bsecpToggle = document.querySelector('[href="#bsecpSubmenu"]');
            if (bsecpSubmenu && bsecpToggle) {
                bsecpSubmenu.classList.add('show');
                bsecpToggle.classList.remove('collapsed');
                bsecpToggle.setAttribute('aria-expanded', 'true');
                
                // 确保对应的子项被激活
                const authQueryModifyLink = document.querySelector('[data-page="bsecp_auth_query_modify"]');
                if (authQueryModifyLink) {
                    authQueryModifyLink.classList.add('active');
                }
            }
        }
    });

});

// 获取当前登录用户信息
function getCurrentUser() {
    fetch('/api/current-user')
        .then(response => {
            if (!response.ok) {
                throw new Error('获取用户信息失败');
            }
            return response.json();
        })
        .then(data => {
            const userNameElement = document.getElementById('current-user-name');
            if (userNameElement && data.username) {
                userNameElement.textContent = data.username;
            }
            
            // 根据用户权限控制侧边栏显示
            if (data.permissions) {
                setupSidebarPermissions(data.permissions, data.role);
            }
        })
        .catch(error => {
            console.error('获取用户信息失败:', error);
            const userNameElement = document.getElementById('current-user-name');
            if (userNameElement) {
                userNameElement.textContent = '游客';
            }
        });
}

// 根据用户权限设置侧边栏显示
function setupSidebarPermissions(permissionsJson, role) {
    try {
        const permissions = JSON.parse(permissionsJson);
        
        // 如果是管理员，显示所有菜单
        const isAdmin = role === 'admin' || permissions.includes('admin');
        
        // 获取所有带权限标识的菜单项
        const menuItems = document.querySelectorAll('[data-permission]');
        
        menuItems.forEach(item => {
            const permission = item.getAttribute('data-permission');
            
            // 管理员显示所有菜单，普通用户根据权限显示
            if (isAdmin || permissions.includes(permission)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
        
        // 检查子菜单是否为空，如果为空则隐藏父菜单
        const submenus = document.querySelectorAll('.has-submenu');
        submenus.forEach(submenu => {
            const submenuItems = submenu.querySelectorAll('li[data-permission]');
            const visibleItems = Array.from(submenuItems).filter(item => 
                item.style.display !== 'none'
            );
            
            if (visibleItems.length === 0) {
                submenu.style.display = 'none';
            } else {
                submenu.style.display = 'block';
            }
        });
        
    } catch (error) {
        console.error('解析权限失败:', error);
    }
}

// 页面加载完成后获取用户信息
document.addEventListener('DOMContentLoaded', function() {
    getCurrentUser();
});

// 页面可见性变化时的处理
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            // 页面变为可见时，重新检查侧边栏状态
            const currentPath = window.location.pathname;
            const pageMap = {
                '/dashboard': 'dashboard',
                '/port_mapping': 'port_mapping',
                '/domain_mapping': 'domain_mapping',
                '/virtual_machines': 'virtual_machines',
                '/physical_machines': 'physical_machines',
                '/namespaces': 'namespaces',
                '/qualification_management': 'qualification_management',
                '/bsecp/modules': 'bsecp_modules',
                '/bsecp/authorization-query': 'bsecp_authorization_query',
                '/bsecp/auth-query-modify': 'bsecp_auth_query_modify',
                '/host_monitoring': 'host_monitoring',
                '/k8smonitoring': 'k8s_monitoring',
                '/cron_monitoring': 'cron_monitoring',
                '/user_management': 'user_management'
            };
            
            const currentPage = pageMap[currentPath] || 'dashboard';
            
            // 处理不同页面的侧边栏状态
            if (currentPage === 'bsecp_auth_query_modify') {
                // 确保BSECP子菜单展开
                const bsecpSubmenu = document.getElementById('bsecpSubmenu');
                const bsecpToggle = document.querySelector('[href="#bsecpSubmenu"]');
                if (bsecpSubmenu && bsecpToggle) {
                    bsecpSubmenu.classList.add('show');
                    bsecpToggle.classList.remove('collapsed');
                    bsecpToggle.setAttribute('aria-expanded', 'true');
                    
                    // 确保对应的子项被激活
                    const authQueryModifyLink = document.querySelector('[data-page="bsecp_auth_query_modify"]');
                    if (authQueryModifyLink) {
                        // 移除其他激活状态
                        document.querySelectorAll('.nav-link').forEach(link => {
                            link.classList.remove('active');
                        });
                        authQueryModifyLink.classList.add('active');
                    }
                }
            } else if (currentPage === 'user_management') {
                // 确保系统管理子菜单展开
                const systemSubmenu = document.getElementById('systemSubmenu');
                const systemToggle = document.querySelector('[href="#systemSubmenu"]');
                if (systemSubmenu && systemToggle) {
                    systemSubmenu.classList.add('show');
                    systemToggle.classList.remove('collapsed');
                    systemToggle.setAttribute('aria-expanded', 'true');
                    
                    // 确保对应的子项被激活
                    const userManagementLink = document.querySelector('[data-page="user_management"]');
                    if (userManagementLink) {
                        // 移除其他激活状态
                        document.querySelectorAll('.nav-link').forEach(link => {
                            link.classList.remove('active');
                        });
                        userManagementLink.classList.add('active');
                    }
                }
            }
    }
});
