{% extends "sidebar.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mt-4">授权查询</h1>
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-key"></i> 授权信息查询
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('bsecp.auth_query') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="form-group">
                    <label for="user_id">用户ID</label>
                    <input type="text" class="form-control" id="user_id" name="user_id" placeholder="输入用户ID">
                </div>
                <div class="form-group">
                    <label for="resource">资源名称</label>
                    <input type="text" class="form-control" id="resource" name="resource" placeholder="输入资源名称">
                </div>
                <button type="submit" class="btn btn-primary">查询</button>
            </form>

            {% if results %}
            <div class="table-responsive mt-4">
                <table class="table table-bordered" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>用户ID</th>
                            <th>资源</th>
                            <th>权限</th>
                            <th>授权时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for result in results %}
                        <tr>
                            <td>{{ result.user_id }}</td>
                            <td>{{ result.resource }}</td>
                            <td>{{ result.permission }}</td>
                            <td>{{ result.grant_time }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
